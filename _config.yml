# Book settings
# Learn more at https://jupyterbook.org/customize/config.html

title: Focal QuantAI
author: Focal QuantAI
copyright: "2025"
logo: logo.png
exclude_patterns: [_build, Thumbs.db, .DS_Store, "**.ipynb_checkpoints"]
only_build_toc_files: true

# Force re-execution of notebooks on each build.
# See https://jupyterbook.org/content/execute.html
execute:
  execute_notebooks: false

parse:
  myst_enable_extensions: # default extensions to enable in the myst parser. See https://myst-parser.readthedocs.io/en/latest/using/syntax-optional.html
    # - amsmath
    - colon_fence
    # - deflist
    - dollarmath
    # - html_admonition
    - html_image
    - linkify
    # - replacements
    - smartquotes
    - substitution
    - tasklist
  myst_url_schemes: [mailto, http, https] # URI schemes that will be recognised as external URLs in Markdown links
  myst_dmath_double_inline: true # Allow display math ($$) within an inline context

# Define the name of the latex output file for PDF builds
latex:
  latex_engine: pdflatex # one of 'pdflatex', 'xelatex' (recommended for unicode), 'luatex', 'platex', 'uplatex'
  use_jupyterbook_latex: true # use sphinx-jupyterbook-latex for pdf builds as default
  latex_documents:
    targetname: book.tex

launch_buttons:
  notebook_interface: classic # The interface interactive links will activate ["classic", "jupyterlab"]

# Add a bibtex file so that we can create citations
bibtex_bibfiles:
  - references.bib

# Information about where the book exists on the web
repository:
  url: https://github.com/Focal-QuantAI/Focal-QuantAI # Online location of your book
  path_to_book: _build # Optional path to your book, relative to the repository root
  branch: master # Which branch of the repository should be used when creating links (optional)

# Add GitHub buttons to your book
# See https://jupyterbook.org/customize/config.html#add-a-link-to-your-repository
html:
  favicon: "logo.png" # A path to a favicon image
  use_issues_button: false
  use_repository_button: false
  use_download_button: false
  extra_footer: "Focal QuantAI"
  home_page_in_navbar: true # Whether to include your home page in the left Navigation Bar
  analytics:
    google_analytics_id: "" # A GA id that can be used to track book views.
  comments:
    hypothesis: false
    utterances: false
